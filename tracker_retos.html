<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guerreros del Agua — IntSeg</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --border: #dde3ee;
    --text: #1a1f2e;
    --text-dim: #7a8499;
    --gold-border: #f5c400;
    --orange-border: #e07800;
    --gray-border: #aab0bf;
    --red-border: #e53e3e;
    --blue: #1e6fff;
    --green-row: #e6f9ee;
    --green-border: #22c55e;
    --orange-row: #ffe8c4;
    --gray-row: #ebebeb;
    --red-row: #ffe5e5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 12px 14px 40px; }

  header { text-align: center; margin-bottom: 8px; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem, 5vw, 2.6rem); letter-spacing: 0.12em; color: var(--text); line-height: 1; }
  header h1 span { color: var(--blue); }
  header p { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }

  .sync-wrap { text-align: center; margin-bottom: 8px; }
  .sync-status { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; display: inline-block; }
  .sync-ok   { background: #e6f9ee; color: #14532d; border: 1px solid #22c55e; }
  .sync-err  { background: #fff0f0; color: #9b0000; border: 1px solid #e53e3e; }
  .sync-wait { background: #fffbea; color: #7a5a00; border: 1px solid #f5c400; }

  /* SUMMARY ARRIBA */
  .summary { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
  .sum-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; text-align: center; min-width: 70px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
  .sum-card .sum-icon  { font-size: 1.1rem; }
  .sum-card .sum-num   { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1.1; color: var(--text); }
  .sum-card .sum-label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }
  .sum-card.bad  { border-color: var(--red-border);    background: #fee2e2; }
  .sum-card.warn { border-color: #16a34a; background: #dcfce7; }
  .sum-card.good { border-color: #ca8a04; background: #fde047; }
  .sum-card.noconf { border-color: #3b82f6; background: #dbeafe; }
  .week-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
  .week-nav button { background: white; border: 1px solid var(--border); color: var(--blue); font-size: 0.9rem; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: background 0.15s; }
  .week-nav button:hover { background: #e8eeff; }
  #week-label { font-size: 0.78rem; font-weight: 700; color: var(--text); letter-spacing: 0.04em; min-width: 180px; text-align: center; }

  .legend { display: flex; flex-wrap: wrap; gap: 6px 12px; justify-content: center; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 600; color: var(--text-dim); background: white; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }

  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  table { width: 100%; min-width: 680px; border-collapse: collapse; }
  thead tr { background: #f7f9fc; border-bottom: 2px solid var(--border); }
  thead th { padding: 8px 5px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); text-align: center; }
  thead th:first-child { text-align: left; padding-left: 14px; min-width: 140px; color: var(--text); }
  thead th.today-col { background: #e8f0ff; color: var(--blue) !important; border-top: 3px solid var(--blue); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.row-gold, tbody tr.row-delay, tbody tr.row-noconf, tbody tr.row-absent { background: white; }
  td { padding: 5px 3px; text-align: center; vertical-align: middle; }
  td:first-child { padding-left: 14px; text-align: left; }
  td.today-col { background: rgba(30,111,255,0.04); }

  .client-label { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; }

  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; border-radius: 8px; padding: 4px 2px; }
  .day-cell.estado-gold   { background: #fde047; }
  .day-cell.estado-delay  { background: #dcfce7; }
  .day-cell.estado-noconf { background: #dbeafe; }
  .day-cell.estado-absent { background: #fee2e2; }

  .turno-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 3px 5px; border-radius: 6px; transition: transform 0.12s; }
  .turno-btn:hover { transform: scale(1.25); }

  .junta-pill { cursor: pointer; border: none; background: none; padding: 0; }
  .junta-status { font-size: 0.55rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 20px; white-space: nowrap; transition: transform 0.15s; display: block; }
  .junta-status.ok { background: #bbf7d0; color: #14532d; border: 1.5px solid #22c55e; }
  .junta-status.no { background: #fecaca; color: #7f1d1d; border: 1.5px solid var(--red-border); }
  .junta-pill:hover .junta-status { transform: scale(1.08); }

  .actions { display: flex; gap: 12px; justify-content: center; margin-top: 14px; }
  .btn { font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; transition: transform 0.12s; }
  .btn:hover { transform: translateY(-2px); }
  .btn-reset { background: white; color: #e53e3e; border: 1.5px solid #e53e3e; }

  footer { text-align: center; margin-top: 20px; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.04em; }
</style>
</head>
<body>

<header>
  <h1>GUERREROS <span>DEL AGUA</span></h1>
  <p>Grupo IntSeg — Reto semanal de equipos</p>
</header>

<div class="sync-wrap">
  <span id="sync-status" class="sync-status sync-wait">⏳ Conectando...</span>
</div>

<div class="summary" id="summary-bar"></div>

<div class="week-nav">
  <button onclick="changeWeek(-1)">◀</button>
  <span id="week-label"></span>
  <button onclick="changeWeek(1)">▶</button>
</div>

<div class="legend">
  <div class="legend-item">🥇 Turno dorado</div>
  <div class="legend-item">⏰ Retraso</div>
  <div class="legend-item">❓ Sin confirmación</div>
  <div class="legend-item">❌ Falta / Ausencia</div>
  <div class="legend-item" style="gap:4px">
    <span style="background:#bbf7d0;color:#14532d;border:1.5px solid #22c55e;border-radius:20px;padding:1px 6px;font-size:0.65rem;font-weight:800">✓ JUNTA</span>
    /
    <span style="background:#fecaca;color:#7f1d1d;border:1.5px solid #e53e3e;border-radius:20px;padding:1px 6px;font-size:0.65rem;font-weight:800">✗ SIN JUNTA</span>
  </div>
</div>

<div class="table-wrap">
  <table id="tracker-table">
    <thead>
      <tr id="header-row"><th>CLIENTE</th></tr>
    </thead>
    <tbody id="tracker-body"></tbody>
  </table>
</div>

<div class="actions">
  <button class="btn btn-reset" onclick="resetSemana()">↺ Reiniciar semana</button>
</div>

<footer>
  Toca el emoji para cambiar turno · Toca la píldora para marcar junta diaria
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGSpNLto2RahUg6yb-ROV1SnXZLUg6c_Y",
  authDomain: "guerrerosagua.firebaseapp.com",
  projectId: "guerrerosagua",
  storageBucket: "guerrerosagua.firebasestorage.app",
  messagingSenderId: "552276093659",
  appId: "1:552276093659:web:d49cb82785ace721ff7afe"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const CLIENTES = ['La Mission','Medimexico','Centerpiece','Cryoinfra','Grupo Baca','TDS','Auxitrol','Harmony','Rockwest'];
const DIAS     = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const ESTADOS  = ['🥇','⏰','❓','❌'];
const ESTADO_PRIORITY = [0, 2, 1, 3];
const ROW_CLASS = ['row-gold','row-delay','row-noconf','row-absent'];

let weekOffset = 0;
let data = {};

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (state === 'ok')   { el.className = 'sync-status sync-ok';   el.textContent = '✅ Sincronizado'; }
  if (state === 'err')  { el.className = 'sync-status sync-err';  el.textContent = '⚠️ Sin conexión — modo local'; }
  if (state === 'wait') { el.className = 'sync-status sync-wait'; el.textContent = '⏳ Guardando...'; }
}

function getMonday(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function getWeekKey(offset) { return getMonday(offset).toISOString().slice(0,10); }

function getDaysOfWeek(offset) {
  const mon = getMonday(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return d;
  });
}

function getTodayDayIndex() {
  const d = new Date().getDay(); return d === 0 ? 6 : d - 1;
}

function ensureWeek(key) {
  if (!data[key]) {
    data[key] = {};
    CLIENTES.forEach(c => {
      data[key][c] = Array.from({length:7}, () => ({turno:0, junta:false}));
    });
  }
}

async function saveData() {
  const key = getWeekKey(weekOffset);
  localStorage.setItem('intseg_retos_v3', JSON.stringify(data));
  setSyncStatus('wait');
  try {
    await setDoc(doc(db, 'semanas', key), { semana: key, clientes: data[key] });
    setSyncStatus('ok');
  } catch(e) {
    console.warn('Firebase error:', e);
    setSyncStatus('err');
  }
}

async function loadData() {
  const key = getWeekKey(weekOffset);
  ensureWeek(key);
  try {
    const snap = await getDoc(doc(db, 'semanas', key));
    if (snap.exists()) {
      const saved = snap.data().clientes;
      CLIENTES.forEach(c => {
        if (!saved[c]) saved[c] = Array.from({length:7}, () => ({turno:0, junta:false}));
      });
      data[key] = saved;
      localStorage.setItem('intseg_retos_v3', JSON.stringify(data));
    }
    setSyncStatus('ok');
  } catch(e) {
    console.warn('Firebase error:', e);
    setSyncStatus('err');
    const raw = localStorage.getItem('intseg_retos_v3');
    if (raw) data = JSON.parse(raw);
    ensureWeek(key);
  }
}

function changeWeek(dir) {
  weekOffset += dir;
  loadData().then(() => render());
}

function worstState(clienteData) {
  let worst = 0;
  clienteData.forEach(d => {
    if (ESTADO_PRIORITY[d.turno] > ESTADO_PRIORITY[worst]) worst = d.turno;
  });
  return worst;
}

function cycleTurno(cliente, diaIdx) {
  const key = getWeekKey(weekOffset);
  data[key][cliente][diaIdx].turno = (data[key][cliente][diaIdx].turno + 1) % 4;
  saveData(); renderBody(); renderSummary();
}

function toggleJunta(cliente, diaIdx) {
  const key = getWeekKey(weekOffset);
  data[key][cliente][diaIdx].junta = !data[key][cliente][diaIdx].junta;
  saveData(); renderBody(); renderSummary();
}

async function resetSemana() {
  if (!confirm('¿Reiniciar todos los datos de esta semana?')) return;
  const key = getWeekKey(weekOffset);
  delete data[key];
  ensureWeek(key);
  await saveData();
  render();
}

function renderHeader() {
  const row = document.getElementById('header-row');
  while (row.children.length > 1) row.removeChild(row.lastChild);
  const days = getDaysOfWeek(weekOffset);
  const todayIdx = weekOffset === 0 ? getTodayDayIndex() : -1;
  days.forEach((d, i) => {
    const th = document.createElement('th');
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    th.innerHTML = `${DIAS[i]}<br><span style="font-size:0.58rem;font-weight:400">${dd}/${mm}</span>`;
    if (i === todayIdx) th.classList.add('today-col');
    row.appendChild(th);
  });
  const days2 = getDaysOfWeek(weekOffset);
  const fmt = d => `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  document.getElementById('week-label').textContent = `${fmt(days2[0])} – ${fmt(days2[6])}`;
}

function renderBody() {
  const key = getWeekKey(weekOffset);
  const tbody = document.getElementById('tracker-body');
  const todayIdx = weekOffset === 0 ? getTodayDayIndex() : -1;
  tbody.innerHTML = '';
  CLIENTES.forEach(cliente => {
    const clienteData = data[key][cliente];
    const worst = worstState(clienteData);
    const tr = document.createElement('tr');
    tr.className = ROW_CLASS[worst];
    const tdName = document.createElement('td');
    const label = document.createElement('span');
    label.className = 'client-label';
    label.textContent = cliente;
    tdName.appendChild(label);
    tr.appendChild(tdName);
    for (let i = 0; i < 7; i++) {
      const td = document.createElement('td');
      if (i === todayIdx) td.classList.add('today-col');
      const cell = clienteData[i];
      const div = document.createElement('div');

      const esFuturo = weekOffset > 0 || (weekOffset === 0 && i > getTodayDayIndex());
      const estadoClass = ['estado-gold','estado-delay','estado-noconf','estado-absent'];
      div.className = `day-cell${esFuturo ? '' : ' ' + estadoClass[cell.turno]}`;

      const btn = document.createElement('button');
      btn.className = 'turno-btn' + (cell.turno === 3 ? ' absent-pulse' : '');
      btn.textContent = ESTADOS[cell.turno];
      btn.onclick = () => cycleTurno(cliente, i);
      div.appendChild(btn);
      const pill = document.createElement('button');
      pill.className = 'junta-pill';
      pill.onclick = () => toggleJunta(cliente, i);
      const status = document.createElement('span');
      status.className = `junta-status ${cell.junta ? 'ok' : 'no'}`;
      status.textContent = cell.junta ? '✓ JUNTA' : '✗ SIN JUNTA';
      pill.appendChild(status);
      div.appendChild(pill);

      if (esFuturo) {
        btn.style.opacity = '0.25';
        btn.style.pointerEvents = 'none';
        pill.style.opacity = '0.25';
        pill.style.pointerEvents = 'none';
      }

      td.appendChild(div);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

function renderSummary() {
  const key = getWeekKey(weekOffset);
  const bar = document.getElementById('summary-bar');
  bar.innerHTML = '';
  let counts = [0,0,0,0], juntas = 0, totalDays = 0;
  CLIENTES.forEach(c => {
    for (let i = 0; i < 7; i++) {
      const esFuturo = weekOffset > 0 || (weekOffset === 0 && i > getTodayDayIndex());
      if (esFuturo) continue;
      const cell = data[key][c][i];
      counts[cell.turno]++;
      if (cell.junta) juntas++;
      totalDays++;
    }
  });
  [
    { icon:'🥇', label:'Dorados',  n: counts[0], cls:'good' },
    { icon:'⏰', label:'Retrasos', n: counts[1], cls:'warn' },
    { icon:'❓', label:'Sin conf', n: counts[2], cls:'noconf' },
    { icon:'❌', label:'Faltas',   n: counts[3], cls:'bad' },
    { icon:'📋', label:'Juntas',   n: `${juntas}/${totalDays}`, cls:'' },
  ].forEach(it => {
    const card = document.createElement('div');
    card.className = `sum-card ${it.cls}`;
    card.innerHTML = `<div class="sum-icon">${it.icon}</div><div class="sum-num">${it.n}</div><div class="sum-label">${it.label}</div>`;
    bar.appendChild(card);
  });
}

function render() {
  const key = getWeekKey(weekOffset);
  ensureWeek(key);
  renderHeader();
  renderBody();
  renderSummary();
}

window.changeWeek = changeWeek;
window.resetSemana = resetSemana;
loadData().then(() => render());
</script>
</body>
</html>
