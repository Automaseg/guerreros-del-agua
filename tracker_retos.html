<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guerreros del Agua — IntSeg</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --border: #dde3ee;
    --text: #1a1f2e;
    --text-dim: #7a8499;

    --gold-border: #f5c400;
    --orange-border: #e07800;
    --gray-border: #aab0bf;
    --red-border: #e53e3e;

    --blue: #1e6fff;
    --green-row: #e6f9ee;
    --green-border: #22c55e;
    --orange-row: #ffe8c4;
    --gray-row: #ebebeb;
    --red-row: #ffe5e5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 20px 14px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: 0.12em;
    color: var(--text);
    line-height: 1;
  }

  header h1 span { color: var(--blue); }

  header p {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .week-nav button {
    background: white;
    border: 1px solid var(--border);
    color: var(--blue);
    font-size: 1rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.15s;
  }

  .week-nav button:hover { background: #e8eeff; }

  #week-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    min-width: 200px;
    text-align: center;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  table {
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
  }

  thead tr {
    background: #f7f9fc;
    border-bottom: 2px solid var(--border);
  }

  thead th {
    padding: 10px 6px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
  }

  thead th:first-child {
    text-align: left;
    padding-left: 18px;
    min-width: 160px;
    color: var(--text);
  }

  thead th.today-col {
    background: #e8f0ff;
    color: var(--blue) !important;
    border-top: 3px solid var(--blue);
  }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }

  tbody tr.row-gold   { background: var(--green-row); }
  tbody tr.row-delay  { background: var(--orange-row); }
  tbody tr.row-noconf { background: var(--gray-row); }
  tbody tr.row-absent { background: var(--red-row); }

  tbody tr.row-absent td:first-child { border-left: 6px solid var(--red-border); }
  tbody tr.row-delay  td:first-child { border-left: 6px solid var(--orange-border); }
  tbody tr.row-noconf td:first-child { border-left: 6px solid var(--gray-border); }
  tbody tr.row-gold   td:first-child { border-left: 6px solid var(--green-border); }

  td {
    padding: 7px 3px;
    text-align: center;
    vertical-align: middle;
  }

  td:first-child { padding-left: 14px; text-align: left; }
  td.today-col   { background: rgba(30,111,255,0.04); }

  .client-name-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .client-label {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  .client-badge {
    font-size: 0.62rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: inline-block;
    width: fit-content;
  }

  .badge-gold   { background: #fef08a; color: #7a5a00; border: 1.5px solid var(--gold-border); }
  .badge-delay  { background: #fed7aa; color: #7a3800; border: 1.5px solid var(--orange-border); }
  .badge-noconf { background: #e5e7eb; color: #444;    border: 1.5px solid var(--gray-border); }
  .badge-absent { background: #fecaca; color: #9b0000; border: 1.5px solid var(--red-border); }

  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .turno-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.35rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 8px;
    transition: transform 0.12s;
  }

  .turno-btn:hover { transform: scale(1.25); }

  .turno-btn.absent-pulse { animation: pulse-red 1.3s infinite; }

  @keyframes pulse-red {
    0%, 100% { filter: drop-shadow(0 0 2px #e53e3e); }
    50%       { filter: drop-shadow(0 0 9px #e53e3e); }
  }

  .junta-pill {
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
  }

  .junta-status {
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 20px;
    white-space: nowrap;
    transition: transform 0.15s;
    display: block;
  }

  .junta-status.ok {
    background: #bbf7d0;
    color: #14532d;
    border: 1.5px solid #22c55e;
  }

  .junta-status.no {
    background: #fecaca;
    color: #7f1d1d;
    border: 1.5px solid var(--red-border);
    animation: pulse-junta 1.6s infinite;
  }

  @keyframes pulse-junta {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,62,62,0); }
    50%       { box-shadow: 0 0 0 3px rgba(229,62,62,0.3); }
  }

  .junta-pill:hover .junta-status { transform: scale(1.08); }

  .summary {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 18px;
  }

  .sum-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    text-align: center;
    min-width: 90px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .sum-card .sum-icon  { font-size: 1.4rem; }
  .sum-card .sum-num   { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; line-height: 1.1; color: var(--text); }
  .sum-card .sum-label { font-size: 0.68rem; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }

  .sum-card.bad  { border-color: var(--red-border);    background: #fff0f0; }
  .sum-card.warn { border-color: var(--orange-border); background: #fff4e5; }
  .sum-card.good { border-color: var(--green-border);  background: var(--green-row); }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: transform 0.12s;
  }

  .btn:hover { transform: translateY(-2px); }

  .btn-reset {
    background: white;
    color: #e53e3e;
    border: 1.5px solid #e53e3e;
  }

  footer {
    text-align: center;
    margin-top: 28px;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<header>
  <h1>GUERREROS <span>DEL AGUA</span></h1>
  <p>Grupo IntSeg — Reto semanal de equipos</p>
</header>

<div class="week-nav">
  <button onclick="changeWeek(-1)">◀</button>
  <span id="week-label"></span>
  <button onclick="changeWeek(1)">▶</button>
</div>

<div class="legend">
  <div class="legend-item">🥇 Turno dorado</div>
  <div class="legend-item">⏰ Retraso</div>
  <div class="legend-item">❓ Sin confirmación</div>
  <div class="legend-item">❌ Falta / Ausencia</div>
  <div class="legend-item" style="gap:4px">
    <span style="background:#bbf7d0;color:#14532d;border:1.5px solid #22c55e;border-radius:20px;padding:1px 7px;font-size:0.68rem;font-weight:800">✓ JUNTA</span>
    /
    <span style="background:#fecaca;color:#7f1d1d;border:1.5px solid #e53e3e;border-radius:20px;padding:1px 7px;font-size:0.68rem;font-weight:800">✗ SIN JUNTA</span>
  </div>
</div>

<div class="table-wrap">
  <table id="tracker-table">
    <thead>
      <tr id="header-row">
        <th>CLIENTE</th>
      </tr>
    </thead>
    <tbody id="tracker-body"></tbody>
  </table>
</div>

<div class="summary" id="summary-bar"></div>

<div class="actions">
  <button class="btn btn-reset" onclick="resetSemana()">↺ Reiniciar semana</button>
</div>

<footer>
  Toca el emoji para cambiar turno · Toca la píldora para marcar junta diaria
</footer>

<script>
const CLIENTES = [
  'La Mission','Medimexico','Centerpiece',
  'Cryoinfra','Grupo Baca','TDS',
  'Auxitrol','Harmony'
];

const DIAS    = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const ESTADOS = ['🥇','⏰','❓','❌'];

const ESTADO_PRIORITY = [0, 2, 1, 3];

const ROW_CLASS   = ['row-gold','row-delay','row-noconf','row-absent'];
const BADGE_CLASS = ['badge-gold','badge-delay','badge-noconf','badge-absent'];
const BADGE_TEXT  = ['⭐ DORADO','⚠️ RETRASO','❓ SIN CONF','🚨 FALTA'];

let weekOffset = 0;
let data = {};

function getMonday(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function getWeekKey(offset) {
  return getMonday(offset).toISOString().slice(0,10);
}

function getDaysOfWeek(offset) {
  const mon = getMonday(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function getTodayDayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyb84gKuTqcL71bkcsMoO1ozl8uksKxPwgUac0wDN3JRvGgW5Tz0kHsI8LUo4Gtjxw/exec';

async function saveData() {
  const key = getWeekKey(weekOffset);
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ key, value: data[key] })
    });
  } catch(e) {
    console.warn('Error guardando:', e);
  }
  localStorage.setItem('intseg_retos_v2', JSON.stringify(data));
}

async function loadData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const remote = await res.json();
    if (remote && Object.keys(remote).length > 0) {
      data = remote;
      localStorage.setItem('intseg_retos_v2', JSON.stringify(data));
      return;
    }
  } catch(e) {
    console.warn('Sin conexión, usando caché local');
  }
  const raw = localStorage.getItem('intseg_retos_v2');
  if (raw) data = JSON.parse(raw);
}

function ensureWeek(key) {
  if (!data[key]) {
    data[key] = {};
    CLIENTES.forEach(c => {
      data[key][c] = Array.from({length:7}, () => ({turno:0, junta:false}));
    });
  }
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

function worstState(clienteData) {
  let worst = 0;
  clienteData.forEach(d => {
    if (ESTADO_PRIORITY[d.turno] > ESTADO_PRIORITY[worst]) worst = d.turno;
  });
  return worst;
}

function cycleTurno(cliente, diaIdx) {
  const key = getWeekKey(weekOffset);
  data[key][cliente][diaIdx].turno = (data[key][cliente][diaIdx].turno + 1) % 4;
  saveData();
  renderBody();
  renderSummary();
}

function toggleJunta(cliente, diaIdx) {
  const key = getWeekKey(weekOffset);
  data[key][cliente][diaIdx].junta = !data[key][cliente][diaIdx].junta;
  saveData();
  renderBody();
  renderSummary();
}

function resetSemana() {
  if (!confirm('¿Reiniciar todos los datos de esta semana?')) return;
  const key = getWeekKey(weekOffset);
  delete data[key];
  ensureWeek(key);
  saveData();
  render();
}

function renderHeader() {
  const row = document.getElementById('header-row');
  while (row.children.length > 1) row.removeChild(row.lastChild);

  const days = getDaysOfWeek(weekOffset);
  const todayIdx = weekOffset === 0 ? getTodayDayIndex() : -1;

  days.forEach((d, i) => {
    const th = document.createElement('th');
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    th.innerHTML = `${DIAS[i]}<br><span style="font-size:0.6rem;font-weight:400">${dd}/${mm}</span>`;
    if (i === todayIdx) th.classList.add('today-col');
    row.appendChild(th);
  });

  const days2 = getDaysOfWeek(weekOffset);
  const fmt = d => `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  document.getElementById('week-label').textContent =
    `${fmt(days2[0])} – ${fmt(days2[6])}`;
}

function renderBody() {
  const key = getWeekKey(weekOffset);
  const tbody = document.getElementById('tracker-body');
  const todayIdx = weekOffset === 0 ? getTodayDayIndex() : -1;
  tbody.innerHTML = '';

  CLIENTES.forEach(cliente => {
    const clienteData = data[key][cliente];
    const worst = worstState(clienteData);

    const tr = document.createElement('tr');
    tr.className = ROW_CLASS[worst];

    // Nombre + badge
    const tdName = document.createElement('td');
    const wrap = document.createElement('div');
    wrap.className = 'client-name-wrap';

    const label = document.createElement('span');
    label.className = 'client-label';
    label.textContent = cliente;

    const badge = document.createElement('span');
    badge.className = `client-badge ${BADGE_CLASS[worst]}`;
    badge.textContent = BADGE_TEXT[worst];

    wrap.appendChild(label);
    wrap.appendChild(badge);
    tdName.appendChild(wrap);
    tr.appendChild(tdName);

    // Días
    for (let i = 0; i < 7; i++) {
      const td = document.createElement('td');
      if (i === todayIdx) td.classList.add('today-col');

      const cell = clienteData[i];
      const div = document.createElement('div');
      div.className = 'day-cell';

      // Turno emoji
      const btn = document.createElement('button');
      btn.className = 'turno-btn' + (cell.turno === 3 ? ' absent-pulse' : '');
      btn.textContent = ESTADOS[cell.turno];
      btn.title = 'Clic para cambiar estado del turno';
      btn.onclick = () => cycleTurno(cliente, i);
      div.appendChild(btn);

      // Junta pill
      const pill = document.createElement('button');
      pill.className = 'junta-pill';
      pill.title = 'Clic para marcar/desmarcar junta diaria';
      pill.onclick = () => toggleJunta(cliente, i);

      const status = document.createElement('span');
      status.className = `junta-status ${cell.junta ? 'ok' : 'no'}`;
      status.textContent = cell.junta ? '✓ JUNTA' : '✗ SIN JUNTA';

      pill.appendChild(status);
      div.appendChild(pill);

      td.appendChild(div);
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });
}

function renderSummary() {
  const key = getWeekKey(weekOffset);
  const bar = document.getElementById('summary-bar');
  bar.innerHTML = '';

  let counts = [0,0,0,0];
  let juntas = 0, totalDays = 0;

  CLIENTES.forEach(c => {
    for (let i = 0; i < 7; i++) {
      const cell = data[key][c][i];
      counts[cell.turno]++;
      if (cell.junta) juntas++;
      totalDays++;
    }
  });

  const items = [
    { icon:'🥇', label:'Dorados',  n: counts[0], cls:'good' },
    { icon:'⏰', label:'Retrasos', n: counts[1], cls:'warn' },
    { icon:'❓', label:'Sin conf', n: counts[2], cls:'' },
    { icon:'❌', label:'Faltas',   n: counts[3], cls:'bad' },
    { icon:'📋', label:'Juntas',   n: `${juntas}/${totalDays}`, cls:'' },
  ];

  items.forEach(it => {
    const card = document.createElement('div');
    card.className = `sum-card ${it.cls}`;
    card.innerHTML = `
      <div class="sum-icon">${it.icon}</div>
      <div class="sum-num">${it.n}</div>
      <div class="sum-label">${it.label}</div>
    `;
    bar.appendChild(card);
  });
}

function render() {
  const key = getWeekKey(weekOffset);
  ensureWeek(key);
  renderHeader();
  renderBody();
  renderSummary();
}

loadData().then(() => render());
</script>
</body>
</html>
